<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf0d5"/>
      <stop offset="100%" stop-color="#f3e8c8"/>
    </linearGradient>
    <linearGradient id="sachet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f77f00"/>
      <stop offset="100%" stop-color="#e06f00"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Decorative -->
  <circle cx="180" cy="180" r="160" fill="#f77f00" opacity="0.04"/>
  <circle cx="620" cy="620" r="200" fill="#045c4b" opacity="0.03"/>
  <!-- Main sachet -->
  <g transform="translate(400,370)">
    <rect x="-80" y="-130" width="160" height="200" rx="12" fill="url(#sachet)"/>
    <!-- Tear line -->
    <line x1="-80" y1="-90" x2="80" y2="-90" stroke="#fdf0d5" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
    <!-- Label -->
    <rect x="-60" y="-60" width="120" height="90" rx="6" fill="#fdf0d5" opacity="0.2"/>
    <!-- Water drops -->
    <g fill="#fdf0d5" opacity="0.85">
      <path d="M-15,-30 Q-15,-45 0,-45 Q15,-45 15,-30 Q15,-15 0,0 Q-15,-15 -15,-30Z" transform="translate(0,-5) scale(0.8)"/>
    </g>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fdf0d5" opacity="0.9" letter-spacing="2">ELECTRO</text>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fdf0d5" opacity="0.9" letter-spacing="2">LYTES</text>
  </g>
  <!-- Background sachets -->
  <g opacity="0.08">
    <rect x="540" y="250" width="100" height="130" rx="8" fill="#045c4b" transform="rotate(10 590 315)"/>
    <rect x="160" y="420" width="100" height="130" rx="8" fill="#045c4b" transform="rotate(-8 210 485)"/>
  </g>
  <!-- Label -->
  <text x="400" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="500" fill="#045c4b" opacity="0.4" letter-spacing="3">30 SACHETS</text>
</svg>