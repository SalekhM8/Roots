<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#045c4b"/>
      <stop offset="100%" stop-color="#003049"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdf0d5" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f3e8c8" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Subtle pattern circles -->
  <circle cx="650" cy="150" r="200" fill="#fdf0d5" opacity="0.03"/>
  <circle cx="150" cy="650" r="250" fill="#f77f00" opacity="0.04"/>
  <!-- Injection pen body -->
  <g transform="translate(400,400) rotate(-30)">
    <rect x="-22" y="-180" width="44" height="300" rx="10" fill="url(#pen)"/>
    <rect x="-18" y="-180" width="36" height="40" rx="6" fill="#f77f00" opacity="0.9"/>
    <rect x="-14" y="120" width="28" height="60" rx="4" fill="#fdf0d5" opacity="0.7"/>
    <!-- Dose window -->
    <rect x="-10" y="-60" width="20" height="50" rx="4" fill="#045c4b" opacity="0.3"/>
    <!-- Needle -->
    <rect x="-2" y="180" width="4" height="40" rx="1" fill="#fdf0d5" opacity="0.5"/>
    <!-- Button top -->
    <rect x="-16" y="-210" width="32" height="30" rx="8" fill="#fdf0d5" opacity="0.8"/>
  </g>
  <!-- Label text -->
  <text x="400" y="680" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="#fdf0d5" opacity="0.6" letter-spacing="4">PRESCRIPTION</text>
</svg>