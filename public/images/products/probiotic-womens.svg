<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf0d5"/>
      <stop offset="100%" stop-color="#f3e8c8"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f77f00"/>
      <stop offset="60%" stop-color="#e06f00"/>
      <stop offset="100%" stop-color="#c45f00"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Decorative organic shapes -->
  <circle cx="620" cy="200" r="150" fill="#045c4b" opacity="0.03"/>
  <circle cx="200" cy="580" r="180" fill="#f77f00" opacity="0.04"/>
  <!-- Probiotic dots (bacteria motif) -->
  <g fill="#045c4b" opacity="0.06">
    <circle cx="180" cy="220" r="20"/>
    <circle cx="210" cy="250" r="14"/>
    <circle cx="600" cy="450" r="18"/>
    <circle cx="630" cy="420" r="12"/>
    <circle cx="580" cy="480" r="10"/>
    <circle cx="250" cy="500" r="15"/>
    <circle cx="550" cy="200" r="16"/>
  </g>
  <!-- Bottle -->
  <g transform="translate(400,380)">
    <!-- Body -->
    <rect x="-65" y="-110" width="130" height="240" rx="16" fill="url(#bottle)"/>
    <!-- Neck -->
    <rect x="-30" y="-145" width="60" height="42" rx="6" fill="#f77f00"/>
    <!-- Cap -->
    <rect x="-36" y="-180" width="72" height="38" rx="10" fill="#045c4b"/>
    <!-- Label -->
    <rect x="-50" y="-50" width="100" height="100" rx="8" fill="#fdf0d5" opacity="0.2"/>
    <!-- Probiotic symbol -->
    <g fill="#fdf0d5" opacity="0.85" transform="translate(0,-15)">
      <circle cx="0" cy="-8" r="12"/>
      <circle cx="-14" cy="10" r="8"/>
      <circle cx="14" cy="10" r="8"/>
      <circle cx="0" cy="18" r="6"/>
    </g>
    <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#fdf0d5" opacity="0.7" letter-spacing="1.5">PROBIOTIC</text>
  </g>
  <!-- Label -->
  <text x="400" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="500" fill="#045c4b" opacity="0.4" letter-spacing="3">30 CAPSULES</text>
</svg>